<!DOCTYPE html>
<html lang="bn" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="কুরআন বাংলা - তাইসিরুল কুরআন অনুবাদ সহ">
    <meta name="theme-color" content="#050807">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>কুরআন বাংলা | Quran Bangla</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;500;700&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#050807',
                            surface: '#0a0f0d',
                            card: '#0f1612',
                            border: '#1a2420',
                            accent: '#14b8a6',
                            gold: '#f5b341',
                            text: '#e8f0ec',
                            muted: '#5a7a6e',
                            highlight: '#1a3a2f'
                        },
                        light: {
                            bg: '#fafcfb',
                            surface: '#ffffff',
                            card: '#f5f8f6',
                            border: '#e2e8e4',
                            accent: '#0d9488',
                            gold: '#b45309',
                            text: '#1a2e29',
                            muted: '#5c7a70'
                        }
                    },
                    fontFamily: {
                        arabic: ['Amiri', 'serif'],
                        arabicHafizi: ['Scheherazade New', 'serif'],
                        bangla: ['Hind Siliguri', 'Noto Sans Bengali', 'sans-serif'],
                        ui: ['Noto Sans Bengali', 'sans-serif']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="font-ui bg-dark-bg text-dark-text overflow-x-hidden antialiased">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-dark-bg flex flex-col items-center justify-center z-50">
        <div class="text-center">
            <div class="w-20 h-20 rounded-full bg-dark-card border-2 border-dark-gold/30 flex items-center justify-center mb-6 mx-auto animate-pulse">
                <svg class="w-12 h-12 text-dark-gold" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-dark-gold mb-2">কুরআন বাংলা</h2>
            <p class="text-dark-muted text-sm">লোড হচ্ছে...</p>
            <div class="mt-4 w-8 h-8 border-2 border-dark-border border-t-dark-accent rounded-full animate-spin mx-auto"></div>
        </div>
    </div>

    <!-- Home Page -->
    <div id="home-page" class="hidden min-h-screen flex flex-col relative overflow-hidden">
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 -left-20 w-80 h-80 bg-dark-accent/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-dark-gold/5 rounded-full blur-3xl"></div>
        </div>

        <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-12">
            <!-- Logo -->
            <div class="mb-8 relative">
                <div class="w-24 h-24 rounded-full bg-dark-card border-2 border-dark-gold/30 flex items-center justify-center">
                    <svg class="w-14 h-14 text-dark-gold" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-full bg-dark-gold flex items-center justify-center">
                    <span class="text-dark-bg font-bold text-sm">১</span>
                </div>
            </div>

            <!-- Title -->
            <div class="text-center mb-10">
                <h1 class="text-4xl md:text-5xl font-bold text-dark-gold mb-3 tracking-wide">কুরআন বাংলা</h1>
                <p class="text-dark-muted text-lg">তাইসিরুল কুরআন অনুবাদ</p>
                <p class="text-dark-muted/60 text-sm mt-2">Quran with Taisirul Quran Translation</p>
            </div>

            <!-- Font Selection Cards -->
            <div class="w-full max-w-sm space-y-4">
                <button id="select-kolkatta" class="w-full p-5 rounded-2xl border-2 border-dark-border bg-dark-card hover:border-dark-accent hover:bg-dark-highlight transition-all duration-300 group cursor-pointer text-right">
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <h2 class="text-xl font-bold text-dark-text group-hover:text-dark-accent mb-1">কলিকাতা ছাপা</h2>
                            <p class="text-dark-muted text-sm">Al Qalam Kolkatta Quranic</p>
                            <p class="text-dark-muted/60 text-xs mt-1">Traditional Indian subcontinent style</p>
                        </div>
                        <div class="text-3xl font-arabic text-dark-gold/80 group-hover:text-dark-gold transition-colors">بِسْمِ</div>
                    </div>
                </button>

                <button id="select-hafizi" class="w-full p-5 rounded-2xl border-2 border-dark-border bg-dark-card hover:border-dark-accent hover:bg-dark-highlight transition-all duration-300 group cursor-pointer text-right">
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <h2 class="text-xl font-bold text-dark-text group-hover:text-dark-accent mb-1">হাফিজি ছাপা</h2>
                            <p class="text-dark-muted text-sm">Al Qalam Quran Majeed</p>
                            <p class="text-dark-muted/60 text-xs mt-1">Modern Madani/Hafizi style</p>
                        </div>
                        <div class="text-3xl font-arabicHafizi text-dark-gold/80 group-hover:text-dark-gold transition-colors">بِسْمِ</div>
                    </div>
                </button>
            </div>

            <div class="mt-12 text-center">
                <p class="text-dark-muted/50 text-sm">আপনার পছন্দের ফন্ট স্টাইল নির্বাচন করুন</p>
                <p class="text-dark-muted/30 text-xs mt-2">Select your preferred Arabic font style</p>
            </div>
        </div>
    </div>

    <!-- Reader Page -->
    <div id="reader-page" class="hidden min-h-screen flex flex-col">
        <!-- Top Navigation Bar -->
        <header class="fixed top-0 left-0 right-0 z-50 bg-dark-bg/95 backdrop-blur-xl border-b border-dark-border/50">
            <div class="flex items-center justify-between px-3 md:px-4 h-16">
                <div class="flex items-center gap-2 md:gap-3">
                    <button id="menu-toggle" class="p-2.5 rounded-xl hover:bg-dark-card transition-colors touch-manipulation">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <div class="min-w-0">
                        <h1 id="current-surah-name" class="font-bangla font-bold text-base md:text-lg truncate max-w-[140px] md:max-w-none">আল-ফাতিহা</h1>
                        <p id="current-ayah-display" class="text-xs text-dark-muted">আয়াত ১ / ৭</p>
                    </div>
                </div>

                <div class="flex items-center gap-1 md:gap-2">
                    <button id="font-size-btn" class="p-2.5 rounded-xl hover:bg-dark-card transition-colors touch-manipulation hidden md:flex" title="Font Size">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/>
                        </svg>
                    </button>
                    <button id="lang-toggle" class="p-2.5 rounded-xl hover:bg-dark-card transition-colors touch-manipulation" title="Language">
                        <span class="text-xs font-bangla font-semibold">বাং</span>
                    </button>
                    <button id="theme-toggle" class="p-2.5 rounded-xl hover:bg-dark-card transition-colors touch-manipulation" title="Theme">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>
                    <button id="translation-toggle" class="p-2.5 rounded-xl hover:bg-dark-card transition-colors touch-manipulation" title="Translation">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                        </svg>
                    </button>
                    <button id="bookmarks-btn" class="p-2.5 rounded-xl hover:bg-dark-card transition-colors touch-manipulation" title="Bookmarks">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="juz-indicator" class="h-0.5 bg-dark-border/50">
                <div id="juz-progress" class="h-full bg-gradient-to-r from-dark-gold to-dark-accent transition-all duration-300" style="width: 0%"></div>
            </div>
        </header>

        <!-- Font Size Modal -->
        <div id="font-size-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-dark-surface rounded-2xl p-6 w-full max-w-xs animate-slide-up">
                <h3 class="font-bangla font-bold text-lg text-center mb-6">ফন্ট সাইজ</h3>
                <div class="flex items-center justify-between gap-4">
                    <button id="font-decrease" class="w-12 h-12 rounded-xl bg-dark-card border border-dark-border flex items-center justify-center hover:border-dark-accent transition-colors">
                        <span class="text-xl font-bold">-</span>
                    </button>
                    <div class="flex-1 text-center">
                        <div id="font-size-display" class="text-3xl font-bold text-dark-gold">২৮</div>
                        <div class="text-xs text-dark-muted">px</div>
                    </div>
                    <button id="font-increase" class="w-12 h-12 rounded-xl bg-dark-card border border-dark-border flex items-center justify-center hover:border-dark-accent transition-colors">
                        <span class="text-xl font-bold">+</span>
                    </button>
                </div>
                <div class="mt-6 flex gap-3">
                    <button id="font-reset" class="flex-1 py-3 rounded-xl bg-dark-card border border-dark-border hover:border-dark-muted transition-colors text-sm">রিসেট</button>
                    <button id="font-close" class="flex-1 py-3 rounded-xl bg-dark-accent text-dark-bg font-semibold hover:opacity-90 transition-colors">বন্ধ</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex flex-1 pt-16">
            <!-- Surah Sidebar -->
            <aside id="surah-sidebar" class="fixed left-0 top-16 bottom-0 w-72 md:w-80 bg-dark-surface border-r border-dark-border/50 transform -translate-x-full transition-transform duration-300 ease-out z-40 overflow-hidden">
                <div class="flex flex-col h-full">
                    <div class="p-4 border-b border-dark-border/30">
                        <div class="relative">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-dark-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <input type="text" id="surah-search" placeholder="সূরা খুঁজুন..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-dark-card border border-dark-border text-dark-text placeholder-dark-muted focus:border-dark-accent focus:outline-none font-bangla text-base">
                        </div>
                    </div>
                    <div id="surah-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
                </div>
            </aside>

            <div id="sidebar-overlay" class="fixed inset-0 bg-black/70 z-30 hidden" onclick="toggleSidebar()"></div>

            <main class="flex-1 w-full max-w-3xl mx-auto">
                <div id="quran-content" class="p-4 md:p-6 pb-32">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p class="loading-text">সূরা লোড হচ্ছে...</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- Mobile Surah Selector -->
        <div id="mobile-surah-selector" class="fixed inset-x-0 bottom-0 bg-dark-surface border-t border-dark-border/50 transform translate-y-full transition-transform duration-300 ease-out z-50 max-h-[70vh] rounded-t-3xl">
            <div class="flex flex-col max-h-full">
                <div class="flex justify-center py-3">
                    <div class="w-12 h-1.5 rounded-full bg-dark-border"></div>
                </div>
                <div class="flex items-center justify-between px-4 pb-3 border-b border-dark-border/30">
                    <h3 class="font-bangla font-bold text-lg">সূরা নির্বাচন</h3>
                    <button id="close-surah-selector" class="p-2 rounded-lg hover:bg-dark-card">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="mobile-surah-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
            </div>
        </div>

        <!-- Bookmarks Modal -->
        <div id="bookmarks-modal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-dark-surface rounded-2xl w-full max-w-sm max-h-[80vh] overflow-hidden animate-slide-up">
                <div class="flex items-center justify-between px-4 py-4 border-b border-dark-border/30">
                    <h3 class="font-bangla font-bold text-lg">বুকমার্ক</h3>
                    <button id="close-bookmarks" class="p-2 rounded-lg hover:bg-dark-card">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="bookmarks-list" class="p-4 space-y-3 overflow-y-auto max-h-[60vh]"></div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-dark-card border border-dark-border px-5 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50">
            <p id="toast-message" class="font-bangla text-sm"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
