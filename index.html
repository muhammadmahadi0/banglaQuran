<!DOCTYPE html>
<html lang="bn" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="কুরআন বাংলা - তাইসিরুল কুরআন অনুবাদ সহ পূর্ণাঙ্গ কুরআন পাঠ">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>কুরআন বাংলা | Quran Bangla</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;500;700&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0d1117',
                            surface: '#161b22',
                            card: '#21262d',
                            border: '#30363d',
                            accent: '#238636',
                            gold: '#d4a857',
                            text: '#e6edf3',
                            muted: '#8b949e',
                            highlight: '#1f6feb'
                        },
                        light: {
                            bg: '#fafbfc',
                            surface: '#ffffff',
                            card: '#f3f4f6',
                            border: '#d0d7de',
                            accent: '#0969da',
                            gold: '#9a6700',
                            text: '#24292f',
                            muted: '#57606a'
                        }
                    },
                    fontFamily: {
                        arabic: ['Amiri', 'serif'],
                        arabicHafizi: ['Scheherazade New', 'serif'],
                        bangla: ['Hind Siliguri', 'Noto Sans Bengali', 'sans-serif']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-slow': 'pulse 3s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Styles */
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --border: #30363d;
            --accent: #238636;
            --gold: #d4a857;
            --text-primary: #e6edf3;
            --text-muted: #8b949e;
            --arabic-kolkatta: 'Amiri', serif;
            --arabic-hafizi: 'Scheherazade New', serif;
            --bangla-font: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
            --font-size-ar: 32px;
        }

        .light-mode {
            --bg-primary: #fafbfc;
            --bg-secondary: #ffffff;
            --bg-card: #f3f4f6;
            --border: #d0d7de;
            --accent: #0969da;
            --gold: #9a6700;
            --text-primary: #24292f;
            --text-muted: #57606a;
        }

        * { -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--bangla-font); background: var(--bg-primary); color: var(--text-primary); transition: all 0.3s ease; }

        /* Arabic Text Styles */
        .arabic-text {
            font-size: var(--font-size-ar);
            line-height: 2.4;
            text-align: center;
            color: var(--text-primary);
            direction: rtl;
            unicode-bidi: plaintext;
            word-spacing: 2px;
        }
        .arabic-kolkatta { font-family: var(--arabic-kolkatta); font-weight: 400; }
        .arabic-hafizi { font-family: var(--arabic-hafizi); font-weight: 500; line-height: 2.2; }

        /* Bangla Translation */
        .bangla-trans {
            font-family: var(--bangla-font);
            font-size: 1.1rem;
            line-height: 1.9;
            color: var(--text-muted);
            text-align: right;
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
        }
        .translation-hidden .bangla-trans { display: none; }

        /* Ayah Card */
        .ayah-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
        }
        .ayah-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(35, 134, 54, 0.1);
        }

        /* Verse Number */
        .verse-num {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 9999px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        .verse-num .ar-num { font-family: var(--arabic-kolkatta); }
        .verse-num .bn-num { font-weight: 600; }

        /* Bismillah */
        .bismillah {
            font-family: var(--arabic-kolkatta);
            font-size: 2rem;
            text-align: center;
            color: var(--gold);
            padding: 2rem 1rem;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .bismillah::before, .bismillah::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .bismillah::before { right: calc(50% + 100px); }
        .bismillah::after { left: calc(50% + 100px); }

        /* Surah Header */
        .surah-header {
            text-align: center;
            padding: 2rem 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            position: relative;
        }
        .surah-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: var(--gold);
        }
        .surah-name-ar { font-family: var(--arabic-kolkatta); font-size: 2.5rem; color: var(--gold); margin-bottom: 0.5rem; }
        .surah-name-bn { font-family: var(--bangla-font); font-size: 1.75rem; font-weight: 700; }
        .surah-meta { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem; }

        /* Ayah Actions */
        .ayah-actions {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            display: flex;
            gap: 0.375rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .ayah-card:hover .ayah-actions { opacity: 1; }
        .ayah-actions button {
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .ayah-actions button:hover { background: var(--accent); border-color: var(--accent); color: white; }
        .ayah-actions button.bookmarked { background: var(--gold); border-color: var(--gold); color: var(--bg-primary); }

        /* Sidebar */
        .sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border); }
        .surah-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .surah-item:hover { background: var(--bg-card); }
        .surah-item.active { background: var(--bg-card); border-right: 3px solid var(--gold); }
        .surah-num {
            width: 2.25rem;
            height: 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 6rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Loading */
        .loader {
            width: 2.5rem;
            height: 2.5rem;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            :root { --font-size-ar: 24px; }
            .bismillah { font-size: 1.5rem; }
            .bismillah::before, .bismillah::after { display: none; }
            .surah-header { padding: 1.5rem 0.5rem; }
            .surah-name-ar { font-size: 1.75rem; }
            .surah-name-bn { font-size: 1.25rem; }
        }

        /* PWA */
        @media (display-mode: standalone) {
            header { padding-top: env(safe-area-inset-top); }
            main { padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body class="bg-dark-bg text-dark-text">
    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 bg-dark-bg flex flex-col items-center justify-center z-50">
        <div class="text-center">
            <div class="w-24 h-24 rounded-full bg-dark-card border-2 border-dark-gold/30 flex items-center justify-center mb-6 mx-auto">
                <svg class="w-14 h-14 text-dark-gold" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>

            </div>
            <h2 class="text-2xl font-bold text-dark-gold mb-2">কুরআন বাংলা</h2>

        </div>

        <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-12">
            <!-- Logo -->
            <div class="mb-10">
                <div class="w-28 h-28 rounded-full bg-dark-card border-2 border-dark-gold/30 flex items-center justify-center shadow-2xl">
                    <svg class="w-16 h-16 text-dark-gold" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>

                </div>

            <!-- Title -->

                    <div class="flex items-center gap-4">

    <!-- Reader Page -->
