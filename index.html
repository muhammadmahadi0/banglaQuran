<!DOCTYPE html>
<html lang="bn" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="কুরআন বাংলা - Quran Bangla with translation">
    <meta name="theme-color" content="#0a0f0d">
    <title>কুরআন বাংলা | Quran Bangla</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0a0f0d',
                            surface: '#111916',
                            card: '#1a2420',
                            border: '#2a3d35',
                            accent: '#2dd4bf',
                            gold: '#fbbf24',
                            text: '#e8f5f1',
                            muted: '#6b8f85'
                        },
                        light: {
                            bg: '#f8faf9',
                            surface: '#ffffff',
                            card: '#f1f5f3',
                            border: '#d1dcd8',
                            accent: '#0d9488',
                            gold: '#b45309',
                            text: '#1a2e29',
                            muted: '#5c7a70'
                        }
                    },
                    fontFamily: {
                        arabic: ['Amiri', 'serif'],
                        arabicHafizi: ['Scheherazade New', 'serif'],
                        bangla: ['Hind Siliguri', 'Noto Sans Bengali', 'sans-serif'],
                        ui: ['Noto Sans Bengali', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="font-ui bg-dark-bg text-dark-text transition-colors duration-300">
    <!-- Home Page -->
    <div id="home-page" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="text-center mb-12">
            <div class="mb-4">
                <svg class="w-16 h-16 mx-auto text-dark-gold" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-dark-gold mb-2">কুরআন বাংলা</h1>
            <p class="text-dark-muted text-lg">Quran with Bangla Translation</p>
        </div>

        <div class="w-full max-w-sm space-y-4">
            <button id="select-kolkatta" class="w-full p-6 rounded-2xl border-2 border-dark-border bg-dark-card hover:border-dark-accent hover:scale-[1.02] transition-all duration-300 group cursor-pointer">
                <div class="text-center">
                    <h2 class="text-2xl font-bold text-dark-text mb-2 group-hover:text-dark-accent">কলিকাতা ছাপা</h2>
                    <p class="text-dark-muted text-sm">Al Qalam Kolkatta Quranic</p>
                    <div class="mt-4 text-3xl font-arabic text-dark-gold">بِسْمِ اللَّهِ</div>
                </div>
            </button>

            <button id="select-hafizi" class="w-full p-6 rounded-2xl border-2 border-dark-border bg-dark-card hover:border-dark-accent hover:scale-[1.02] transition-all duration-300 group cursor-pointer">
                <div class="text-center">
                    <h2 class="text-2xl font-bold text-dark-text mb-2 group-hover:text-dark-accent">হাফিজি ছাপা</h2>
                    <p class="text-dark-muted text-sm">Al Qalam Quran Majeed</p>
                    <div class="mt-4 text-3xl font-arabicHafizi text-dark-gold">بِسْمِ اللَّهِ</div>
                </div>
            </button>
        </div>

        <div class="mt-12 text-center">
            <p class="text-dark-muted text-sm">Choose your preferred font style</p>
        </div>
    </div>

    <!-- Reader Page -->
    <div id="reader-page" class="hidden min-h-screen flex flex-col">
        <!-- Header -->
        <header class="fixed top-0 left-0 right-0 z-50 bg-dark-bg/80 backdrop-blur-lg border-b border-dark-border">
            <div class="flex items-center justify-between px-4 h-16">
                <div class="flex items-center gap-3">
                    <button id="menu-toggle" class="p-2 rounded-lg hover:bg-dark-card transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <div>
                        <h1 id="current-surah-name" class="font-bangla font-bold text-lg">আল-ফাতিহা</h1>
                        <p id="current-ayah-display" class="text-sm text-dark-muted">আয়াত ১ / ৭</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <button id="lang-toggle" class="p-2 rounded-lg hover:bg-dark-card transition-colors" title="Language">
                        <span class="text-sm font-bangla">বাং</span>
                    </button>
                    <button id="theme-toggle" class="p-2 rounded-lg hover:bg-dark-card transition-colors" title="Theme">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>
                    <button id="translation-toggle" class="p-2 rounded-lg hover:bg-dark-card transition-colors" title="Toggle Translation">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                        </svg>
                    </button>
                    <button id="bookmarks-btn" class="p-2 rounded-lg hover:bg-dark-card transition-colors" title="Bookmarks">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Progress bar -->
            <div id="juz-indicator" class="h-1 bg-dark-border">
                <div id="juz-progress" class="h-full bg-dark-gold transition-all duration-300" style="width: 0%"></div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex flex-1 pt-16">
            <!-- Surah Sidebar -->
            <aside id="surah-sidebar" class="fixed left-0 top-16 bottom-0 w-80 bg-dark-surface border-r border-dark-border transform -translate-x-full transition-transform duration-300 overflow-y-auto z-40">
                <div class="p-4">
                    <div class="mb-4">
                        <input type="text" id="surah-search" placeholder="সূরা খুঁজুন..." class="w-full px-4 py-2 rounded-lg bg-dark-card border border-dark-border text-dark-text placeholder-dark-muted focus:border-dark-accent focus:outline-none font-bangla">
                    </div>

                    <div id="surah-list" class="space-y-2">
                        <!-- Surah items will be rendered here -->
                    </div>
                </div>
            </aside>

            <!-- Overlay -->
            <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="toggleSidebar()"></div>

            <!-- Quran Content -->
            <main class="flex-1 p-4 md:p-8 pb-24 max-w-4xl mx-auto w-full">
                <div id="quran-content" class="space-y-6">
                    <!-- Ayahs will be rendered here -->
                </div>
            </main>
        </div>

        <!-- Mobile Surah Selector -->
        <div id="mobile-surah-selector" class="fixed bottom-0 left-0 right-0 bg-dark-surface border-t border-dark-border transform translate-y-full transition-transform duration-300 z-50 max-h-[60vh] overflow-y-auto">
            <div class="p-4">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bangla font-bold text-lg">সূরা নির্বাচন</h3>
                    <button id="close-surah-selector" class="p-2 rounded-lg hover:bg-dark-card">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="mobile-surah-list" class="space-y-2">
                    <!-- Mobile surah items -->
                </div>
            </div>
        </div>

        <!-- Bookmarks Modal -->
        <div id="bookmarks-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
            <div class="bg-dark-surface rounded-2xl w-full max-w-md max-h-[80vh] overflow-hidden">
                <div class="p-4 border-b border-dark-border flex items-center justify-between">
                    <h3 class="font-bangla font-bold text-lg">বুকমার্ক</h3>
                    <button id="close-bookmarks" class="p-2 rounded-lg hover:bg-dark-card">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="bookmarks-list" class="p-4 space-y-2 overflow-y-auto max-h-[60vh]">
                    <!-- Bookmarks will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-dark-card border border-dark-border px-4 py-2 rounded-lg shadow-lg transform translate-y-full opacity-0 transition-all duration-300 z-50">
            <p id="toast-message" class="font-bangla text-sm"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
